name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - name: Version packages (only when publishing)
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        run: npx changeset version
      - name: Publish packages to npm
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        run: npx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Skip publish (missing NPM_TOKEN)
        if: ${{ env.HAS_NPM_TOKEN != 'true' }}
        run: echo "::warning::NPM_TOKEN no está configurado. Se omite la publicación en npm."
